<!--
This sample demonstrates how to build your own Receiver for use with Google
Cast.
 -->
<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="css/receiver.css" media="screen" />
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <!-- Cast Debug Logger -->
  <script src="//www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
  <style>
    #mirrorImage {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      visibility: hidden;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    /* WebRTC mirror video (replaces the MJPEG /stream?live=true path) */
    #rtcVideo {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; object-fit: contain;
      background: #000; visibility: hidden;
    }
    #message {
      color: red;
    }
    /* On-screen debug overlay for the WebRTC path (remove for production) */
    #dbg {
      position: fixed; top: 0; left: 0; right: 0; max-height: 45%; overflow: hidden;
      z-index: 50; padding: 8px; background: rgba(0,0,0,.5);
      color: #0f0; font: 16px/1.3 monospace; white-space: pre-wrap; word-break: break-all;
      display: none;
    }
  </style>
</head>

<body>

  <img id="mirrorImage" src="" alt="Received Image">
  <video id="rtcVideo" autoplay playsinline muted></video>
  <div id="message"></div>
  <div id="dbg"></div>

  <cast-media-player id="videoPlayer"></cast-media-player>


  <footer>
    <script src="js/receiver.js" type="module"></script>
    <script>


    </script>
  </footer>
</body>

</html>
